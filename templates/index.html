<!doctype html>
<html>
<head>
  <title>Remote Control | {{ hostname }}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html {
      font-family: Sans-Serif;
    }

    body {
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
      padding-left: 1em;
      padding-right: 1em;
    }

    td {
      padding-right: 5px;
    }
  </style>

  <script>
    const volumeURL = "{{ url_for('handle_volume') }}";
    const muteURL = "{{ url_for('handle_mute') }}";

    async function getVolume() {
      const response = await fetch(volumeURL);
      if (!response.ok) {
        throw new Error('Bad Response:', response)
      }
      const data = await response.json();
      return data['volume'];
    }

    async function setVolume(value) {
      await fetch(volumeURL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          volume: value,
        }),
      });
    }

    async function getMute() {
      const response = await fetch(muteURL);
      if (!response.ok) {
        throw new Error('Bad Response:', response)
      }
      const data = await response.json();
      return data['mute'];
    }

    async function setMute(value) {
      await fetch(muteURL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          mute: value,
        }),
      });
    }

  function init() {
    const syncButton = document.getElementById('sync-button');
    syncButton.addEventListener('click', syncUI);

    const volumeSlider = document.getElementById('volume-slider');
    const volumeValue = document.getElementById('volume-value');

    // Update UI with volume set on slider
    volumeSlider.addEventListener('input', function() {
      volumeValue.innerHTML = volumeSlider.value;
    });

    // Submit volume set on slider to remote
    volumeSlider.addEventListener('change', function() {
      setVolume(volumeSlider.value)
        .catch(error => console.log(error));
    });

    const muteToggle = document.getElementById('mute-toggle');

    muteToggle.addEventListener('change', function() {
      setMute(muteToggle.checked)
        .catch(error => console.log(error));
    });

    document.addEventListener('keyup', event => {
      if (event.code == 'Space') {
        muteToggle.checked = !muteToggle.checked;
        setMute(muteToggle.checked)
          .catch(error => console.log(error));
      }

      if (event.code == 'Equal') {
        volumeSlider.stepUp(5);
        volumeValue.innerHTML = volumeSlider.value;
        setVolume(volumeSlider.value)
          .catch(error => console.log(error));
      }

      if (event.code == 'Minus') {
        volumeSlider.stepDown(5);
        volumeValue.innerHTML = volumeSlider.value;
        setVolume(volumeSlider.value)
          .catch(error => console.log(error));
      }
    });

    function syncUI() {
      getVolume()
        .then((value) => {
          volumeSlider.value = value;
          volumeValue.innerHTML = value;
        })
        .catch(error => console.log(error));
      getMute()
        .then((value) => {
          muteToggle.checked = value;
        })
        .catch(error => console.log(error));
    }

    // Initialize UI
    syncUI();
  }
  </script>
</head>

<body>
  <h1>Remote Control</h1>
  <hr>

  <br>

  <form>
    <fieldset>
      <legend><b>Info</b></legend>
      <table>
        <tr>
          <td>Hostname</td>
          <td><b><tt>{{ hostname }}</tt></b></td>
        </tr>
        <tr>
          <td>System</td>
          <td><b><tt>{{ system }}</tt></b></td>
        </tr>
      </table>
    </fieldset>

    <br>

    <fieldset>
      <legend><b>Audio</b></legend>
      <table>
        <tr>
          <td><label for="mute-toggle">Mute</label></td>
          <td><input type="checkbox" id="mute-toggle" name="mute-toggle" /></td>
          <td></td>
        </tr>
        <tr>
          <td><label for="volume-slider">Volume</label></td>
          <td><input type="range" min="0" max="100" value="0" name="volume-slider" id="volume-slider" /></td>
          <td><tt>(</tt><tt id="volume-value">0</tt><tt>)</tt></td>
        </tr>
      </table>
    </fieldset>

    <br>

    <fieldset>
      <legend><b>State</b></legend>
      <table>
        <tr>
          <td><label for="sync-button">Sync</label></td>
          <td><input type="button" value="Sync" id="sync-button" name="sync" title="Manually sync from remote state"/></td>
          <td></td>
        </tr>
      </table>
    </fieldset>
  </form>

  <br>
  <hr>
  <br>

  <form>
    <fieldset>
      <legend><b>Shortcuts</b></legend>
      <table>
        <tr>
          <td><tt>&lt;space&gt;</tt></td>
          <td>Toggle mute</td>
        </tr>
        <tr>
          <td><tt>&lt;+/-&gt;</tt></td>
          <td>Increase or decrease volume</td>
        </tr>
      </table>
    </fieldset>
  </form>
</body>

<script>
  init()
</script>

</html>
